name: Dependencies

# Audits Python dependencies on every push to main.
# Keep ignored vulnerabilities explicit so they can be reviewed later.
on:
  push:
    branches: ["main"]

jobs:
  pip-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install --upgrade pip uv

      - name: Install project requirements
        run: uv pip install --system -r requirements.txt

      - name: Install audit tool
        run: uv pip install --system pip-audit

      - name: Audit Python dependencies
        run: python -m pip_audit --ignore-vuln PYSEC-2025-183
