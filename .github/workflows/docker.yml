name: Docker

# Verifies that the Docker image can be built from the current source.
# The broader CI workflow also runs a Docker build; this separate workflow keeps
# Docker status visible on its own in GitHub Actions.
on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build .
