name: CI

# Runs the main quality gate whenever code is pushed to main.
# This workflow is intentionally broad: tests, coverage, linting, formatting,
# security linting, pre-commit hooks, and Docker build validation.
on:
  push:
    branches: ["main"]

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv pip install --system -r requirements.txt
          uv pip install --system black isort bandit pylint ruff pytest-cov pre-commit

      - name: Syntax check
        run: python -m compileall app test migrations

      - name: Tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=100

      - name: Ruff lint
        run: ruff check app test migrations

      - name: Pylint
        run: pylint --rcfile=.pylintrc app test

      - name: Black
        run: black --check app test migrations

      - name: Ruff format
        run: ruff format --check app test migrations

      - name: isort
        run: isort --check-only app test migrations

      - name: Bandit
        run: bandit -r app --skip B106

      - name: Pre-commit
        env:
          PRE_COMMIT_HOME: .cache/pre-commit
        run: pre-commit run --all-files

      - name: Docker build
        run: docker build .
