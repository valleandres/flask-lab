name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install black isort bandit pylint

      - name: Syntax check
        run: python -m compileall app test migrations

      - name: Tests
        run: pytest

      - name: Pylint
        run: pylint --rcfile=.pylintrc app test

      - name: Black
        run: black --check app test migrations

      - name: isort
        run: isort --check-only app test migrations

      - name: Bandit
        run: bandit -r app --skip B106
