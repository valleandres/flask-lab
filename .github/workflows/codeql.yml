name: CodeQL

# Runs GitHub CodeQL analysis on every push to main.
# Results are uploaded to GitHub code scanning for the repository.
on:
  push:
    branches: ["main"]

jobs:
  analyze:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Run CodeQL analysis
        uses: github/codeql-action/analyze@v4
