name: Deploy EC2

# Manual MVP deployment:
# 1. Build the Docker image.
# 2. Push it to ECR.
# 3. Ask the EC2 instance, through SSM, to pull and restart the container.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: flask-lab
  EC2_INSTANCE_ID: i-0c08fd2072f032d80
  ENV_PARAMETER_NAME: /flask-lab/dev/env-production

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v3

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy through SSM
        env:
          IMAGE_URI: ${{ steps.image.outputs.uri }}
        run: |
          COMMAND_ID="$(
            aws ssm send-command \
              --instance-ids "$EC2_INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --comment "Deploy flask-lab $GITHUB_SHA" \
              --parameters commands="[
                \"set -euo pipefail\",
                \"mkdir -p /tmp/flask-lab-deploy\",
                \"cat > /tmp/flask-lab-deploy/deploy_ec2.sh <<'DEPLOY_SCRIPT'\",
                \"$(sed 's/\\/\\\\/g; s/\"/\\"/g' scripts/deploy_ec2.sh)\",
                \"DEPLOY_SCRIPT\",
                \"chmod +x /tmp/flask-lab-deploy/deploy_ec2.sh\",
                \"AWS_REGION=$AWS_REGION ENV_PARAMETER_NAME=$ENV_PARAMETER_NAME IMAGE_URI=$IMAGE_URI /tmp/flask-lab-deploy/deploy_ec2.sh\"
              ]" \
              --query "Command.CommandId" \
              --output text
          )"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
            --output json
