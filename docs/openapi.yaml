openapi: 3.1.0
info:
  title: flask-lab API
  version: 0.1.0
  description: REST API for JWT authentication, user management, and file storage.
servers:
  - url: http://flask.local
    description: Local Docker Compose server
  - url: http://localhost
    description: Localhost server
tags:
  - name: Auth
    description: JWT authentication endpoints.
  - name: Users
    description: User CRUD endpoints.
  - name: Files
    description: Configurable local or private S3 file storage endpoints.
  - name: Operations
    description: Liveness and readiness endpoints for infrastructure monitoring.
paths:
  /health:
    get:
      tags:
        - Operations
      summary: Check whether the Flask process is running.
      responses:
        "200":
          description: Application process is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /ready:
    get:
      tags:
        - Operations
      summary: Check whether the application can receive traffic.
      responses:
        "200":
          description: Application and database are ready.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
        "503":
          description: A required dependency is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessResponse"
  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in and receive a JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            examples:
              admin:
                value:
                  username: admin
                  password: admin
      responses:
        "200":
          description: Login succeeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Login failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                invalidCredentials:
                  value:
                    error: Invalid credentials
  /auth/protected:
    get:
      tags:
        - Auth
      summary: Validate a JWT-protected request.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Access granted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProtectedResponse"
        "401":
          description: Missing, invalid, or expired token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingToken:
                  value:
                    error: Missing token
                invalidToken:
                  value:
                    error: Invalid or expired token
  /api/users:
    get:
      tags:
        - Users
      summary: List users.
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 2
            minimum: 1
        - name: name
          in: query
          description: Case-insensitive partial name filter.
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - id
              - name
            default: id
        - name: order
          in: query
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
      responses:
        "200":
          description: Paginated users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      tags:
        - Users
      summary: Create a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Missing name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingName:
                  value:
                    error: Missing name
  /api/users/{user_id}:
    parameters:
      - name: user_id
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    get:
      tags:
        - Users
      summary: Get one user.
      responses:
        "200":
          description: User found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found.
    put:
      tags:
        - Users
      summary: Update a user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreateRequest"
      responses:
        "200":
          description: User updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Missing name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missingName:
                  value:
                    error: Missing name
        "404":
          description: User not found.
    delete:
      tags:
        - Users
      summary: Delete a user.
      responses:
        "204":
          description: User deleted.
        "404":
          description: User not found.
  /files:
    post:
      tags:
        - Files
      summary: Upload a file.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: File uploaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResponse"
        "400":
          description: Missing file or invalid filename.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Storage service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags:
        - Files
      summary: Delete a file.
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: File deleted.
        "400":
          description: Missing or invalid key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Local file not found.
        "502":
          description: Storage service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /files/url:
    get:
      tags:
        - Files
      summary: Create an access URL for a file.
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Access URL created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUrlResponse"
        "400":
          description: Missing or invalid key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Local or S3 file not found.
        "502":
          description: Storage service unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /files/content:
    get:
      tags:
        - Files
      summary: Download a locally stored file.
      description: Returned local access URLs point to this endpoint. S3 uses presigned URLs.
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Local file contents.
        "400":
          description: Missing or invalid key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Local file not found or local storage is not active.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    ReadinessResponse:
      type: object
      required:
        - status
        - checks
      properties:
        status:
          type: string
          enum:
            - ok
            - unavailable
        checks:
          type: object
          required:
            - database
          properties:
            database:
              type: string
              enum:
                - ok
                - error
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
          format: password
    LoginResponse:
      type: object
      required:
        - token
      properties:
        token:
          type: string
    ProtectedResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          examples:
            - Access granted for user 1.
    UserCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          examples:
            - Ana
    User:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          examples:
            - 1
        name:
          type: string
          examples:
            - Ana
    UserListResponse:
      type: object
      required:
        - page
        - limit
        - total
        - pages
        - data
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        pages:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
    FileUploadResponse:
      type: object
      required:
        - key
      properties:
        key:
          type: string
    FileUrlResponse:
      type: object
      required:
        - key
        - url
      properties:
        key:
          type: string
        url:
          type: string
          format: uri
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
