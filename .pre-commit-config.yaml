repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: Ruff lint
        entry: ruff check
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff format
        entry: ruff format --check
        language: system
        types: [python]

      - id: black
        name: Black
        entry: black --check
        language: system
        types: [python]

      - id: isort
        name: isort
        entry: isort --check-only
        language: system
        types: [python]
