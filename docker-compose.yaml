services:
  web:
    build: .
    ports:
      - "80:5000"
    environment:
      - FLASK_APP=app:create_app
      - FLASK_DEBUG=1
      - APP_ENV=${APP_ENV:-development}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-at-least-32-bytes-long}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-key-at-least-32-bytes}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-mysql+pymysql://user:password@db:3306/mydatabase}
      - CACHE_TYPE=${CACHE_TYPE:-RedisCache}
      - CACHE_REDIS_URL=${CACHE_REDIS_URL:-redis://redis:6379/0}
      - CACHE_DEFAULT_TIMEOUT=${CACHE_DEFAULT_TIMEOUT:-60}
      - CACHE_KEY_PREFIX=${CACHE_KEY_PREFIX:-flask-lab:}
      - CACHE_REDIS_SOCKET_CONNECT_TIMEOUT=${CACHE_REDIS_SOCKET_CONNECT_TIMEOUT:-1}
      - CACHE_REDIS_SOCKET_TIMEOUT=${CACHE_REDIS_SOCKET_TIMEOUT:-1}
      - READINESS_CHECK_CACHE=${READINESS_CHECK_CACHE:-false}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - LOCAL_UPLOAD_FOLDER=${LOCAL_UPLOAD_FOLDER:-uploads}
      - AWS_PROFILE=${AWS_PROFILE:-}
      - AWS_REGION=${AWS_REGION:-us-east-2}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME:-}
      - S3_UPLOAD_PREFIX=${S3_UPLOAD_PREFIX:-files}
      - S3_PRESIGNED_URL_EXPIRATION=${S3_PRESIGNED_URL_EXPIRATION:-3600}
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ${HOME}/.aws:/root/.aws:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"
      interval: 30s
      timeout: 5s
      retries: 3

  test:
    build: .
    environment:
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-at-least-32-bytes-long}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-key-at-least-32-bytes}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-mysql+pymysql://user:password@db:3306/mydatabase}
      - CACHE_TYPE=SimpleCache
      - CACHE_REDIS_URL=${CACHE_REDIS_URL:-redis://redis:6379/0}
      - STORAGE_BACKEND=local
      - LOCAL_UPLOAD_FOLDER=uploads
    volumes:
      - .:/app
    command: pytest
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
