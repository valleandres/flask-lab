services:
  web:
    build: .
    ports:
      - "80:5000"
    env_file:
      - ${ENV_FILE:-.env.development}
    environment:
      - ENV_FILE=${ENV_FILE:-.env.development}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    volumes:
      - .:/app
      - ./logs:/app/logs
      - ${HOME}/.aws:/root/.aws:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health')"
      interval: 30s
      timeout: 5s
      retries: 3

  test:
    build: .
    profiles:
      - test
    environment:
      - APP_ENV=testing
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-at-least-32-bytes-long}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-jwt-secret-key-at-least-32-bytes}
      - SQLALCHEMY_DATABASE_URI=${SQLALCHEMY_DATABASE_URI:-mysql+pymysql://user:password@db:3306/mydatabase}
      - CACHE_TYPE=SimpleCache
      - CACHE_REDIS_URL=${CACHE_REDIS_URL:-redis://redis:6379/0}
      - STORAGE_BACKEND=local
      - LOCAL_UPLOAD_FOLDER=uploads
    volumes:
      - .:/app
    command: pytest
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: user
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h 127.0.0.1 -u root --password=$$MYSQL_ROOT_PASSWORD

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

volumes:
  db_data:
